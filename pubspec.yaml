name: neyro_issledovatel
description: НейроИсследователь — обучение нейросетям для детей (MVP).
publish_to: "none"
version: 0.1.1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.5.0
  cloud_functions: ^5.0.0
  http: ^1.2.0
  flutter_riverpod: ^2.5.0
  audioplayers: ^6.0.0
  lottie: ^3.1.0
  shared_preferences: ^2.2.0
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/icons/
    - assets/images/
    - assets/sounds/