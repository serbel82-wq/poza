name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2.10.0
        with:
          flutter-version: '3.24.5'

      - run: flutter config --enable-web

      - run: flutter pub get

      - name: Build Flutter Web
        run: |
          flutter build web --release --web-renderer html 2>&1 | tee build.log || true
          echo "--- Build exit: $? ---"
          cat build.log

      - name: Check result
        run: |
          if [ -f build/web/main.dart.js ]; then
            echo "BUILD SUCCESS - main.dart.js exists"
            ls -la build/web/
          else
            echo "BUILD FAILED - No main.dart.js"
            ls -la build/ || echo "build dir missing"
            ls -la build/web/ || echo "build/web dir missing"
          fi

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: flutter-build
          path: build/web/
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: flutter-build
          path: ./deploy

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy