name: Manual Deploy (Full)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download full build from known good commit
        run: |
          COMMIT="1ff16915f580297ee5ae7c8c1d1b46e7c7f7cf1b"
          
          mkdir -p output/canvaskit/chromium
          mkdir -p output/icons
          mkdir -p output/assets
          
          files=(
            "main.dart.js"
            "flutter_bootstrap.js" 
            "flutter_service_worker.js"
            "index.html"
            "manifest.json"
            "version.json"
            "flutter.js"
            "canvaskit/canvaskit.js"
            "canvaskit/canvaskit.wasm"
            "canvaskit/canvaskit.js.symbols"
            "canvaskit/skwasm.js"
            "canvaskit/skwasm.wasm"
            "canvaskit/skwasm.worker.js"
            "canvaskit/chromium/canvaskit.js"
            "canvaskit/chromium/canvaskit.wasm"
            "canvaskit/chromium/canvaskit.js.symbols"
            "icons/Icon-192.png"
            "icons/Icon-512.png"
            "icons/Icon-maskable-192.png"
            "icons/Icon-maskable-512.png"
            "assets/AssetManifest.json"
            "assets/AssetManifest.bin"
            "assets/FontManifest.json"
            "assets/NOTICES"
          )
          
          for f in "${files[@]}"; do
            url="https://raw.githubusercontent.com/serbel82-wq/new-neuro-explorer/${COMMIT}/${f}"
            echo "Downloading ${f}..."
            curl -sL -f "$url" -o "output/${f}" || echo "  -> failed or not found"
          done
          
          # Always create .nojekyll
          touch output/.nojekyll
          
          echo "=== Files in output ==="
          find output -type f | head -30
          
      - name: Deploy using git push (bypasses actions-gh-pages issues)
        run: |
          cd output
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy: full build from known good commit"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/serbel82-wq/new-neuro-explorer.git HEAD:gh-pages